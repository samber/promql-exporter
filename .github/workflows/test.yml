name: Tests

on:
  push:
    branches:
      - main
  pull_request:
  schedule:
    - cron: '0 3 * * 1'
  workflow_dispatch:

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6

    - name: Build
      run: make build

    - name: Test
      run: make test

    - name: Coverage
      run: make coverage

    - name: Codecov
      uses: codecov/codecov-action@v6
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        file: ./cover.out
        flags: unittests
        verbose: true
